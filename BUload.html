<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>信用卡快速申報系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --accent: #7C8A7B;
      --dark: #333333;
      --bg: #E8EAEB;
    }

    * {
      box-sizing: border-box;
    }

    /* 滿版無邊界，使用 100dvh 確保動態視窗下不會被裁切 */
    body,
    html {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      height: 100dvh;
      width: 100%;
      overflow: hidden;
    }

    .drag-over {
      background-color: #f0f4f0 !important;
      border-color: var(--accent) !important;
    }

    @keyframes shimmer {
      0% {
        background-position: -400px 0;
      }

      100% {
        background-position: 400px 0;
      }
    }

    .skeleton {
      background: linear-gradient(90deg, #3a3a3a 25%, #4a4a4a 50%, #3a3a3a 75%);
      background-size: 400px 100%;
      animation: shimmer 1.2s infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .img-fade {
      animation: fadeIn 0.2s ease forwards;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    #lightbox.active {
      display: flex;
    }

    #lightboxImg {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #lightboxClose {
      position: absolute;
      top: 20px;
      right: 24px;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    #lightboxClose:hover {
      opacity: 1;
    }

    /* Loading dots */
    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0;
      }

      40% {
        opacity: 1;
      }
    }

    .dot {
      display: inline-block;
      animation: blink 1.4s infinite both;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* Preview slider */
    #previewArea {
      background-color: #333333;
      width: 100%;
      overflow: hidden;
    }

    #previewSlider {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .slide-item {
      flex-shrink: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slide-item img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .slide-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .slide-delete-btn:hover {
      background: rgba(200, 30, 30, 0.85);
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .nav-arrow:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    #navPrev {
      left: 8px;
    }

    #navNext {
      right: 8px;
    }

    #posIndicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }

    /* 針對底部按鈕的安全距離設定 */
    .safe-pb {
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }
  </style>
</head>

<body class="font-sans flex justify-center h-[100dvh]">

  <div id="lightbox">
    <span id="lightboxClose">&times;</span>
    <img id="lightboxImg" src="" alt="preview">
  </div>

  <div
    class="bg-white w-full lg:max-w-md flex flex-col relative h-[100dvh] lg:h-screen lg:shadow-2xl lg:border-x lg:border-gray-300 overflow-hidden mx-auto">

    <div id="step1Container" class="flex flex-col h-full w-full overflow-hidden">

      <div
        class="bg-[#7C8A7B] text-white p-4 flex items-center justify-center relative font-medium shrink-0 shadow-sm z-10">
        <img src="https://r-forms.oneplace.com.tw/gray.png" alt="Logo" class="absolute left-4 h-6 object-contain">
        <span>信用卡快速申報</span>
      </div>

      <div id="previewArea" class="w-full hidden relative bg-[#333333] shrink min-h-[25vh] basis-[60vh]">
        <div id="sliderWrapper" class="w-full h-full relative">
          <div id="previewSlider"></div>
          <button id="navPrev" class="nav-arrow">&#8249;</button>
          <button id="navNext" class="nav-arrow">&#8250;</button>
          <div id="posIndicator">1 / 1</div>
        </div>
      </div>

      <div class="grow shrink-0 flex flex-col justify-center items-center px-6 py-4 bg-white z-10">
        <div class="w-full">
          <label id="uploadLabel" class="block text-sm font-bold text-gray-700 mb-2 text-center">Upload images</label>
          <div id="dropzone"
            class="w-full h-[120px] shrink-0 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center cursor-pointer transition-colors duration-200 hover:bg-gray-50">
            <svg class="w-8 h-8 text-gray-400 mb-1" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" />
            </svg>
            <p class="text-sm text-gray-500 text-center leading-tight">
              Drag &amp; drop files or <span class="underline font-medium text-gray-700">browse</span>
            </p>
            <p class="text-[11px] text-gray-400 mt-1">最多 10 張・每張 5 MB 以內</p>
            <input type="file" id="fileInput" class="hidden" multiple accept="image/*" />
          </div>
          <p id="errorMsg" class="text-xs text-red-500 mt-1.5 hidden text-center"></p>
        </div>
      </div>

      <div
        class="px-5 pt-4 safe-pb bg-white border-t border-gray-100 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
        <button id="nextBtn"
          class="w-full text-white py-3.5 rounded-lg font-bold transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed text-base"
          style="background-color:#7C8A7B; --tw-ring-color:#7C8A7B;">
          進行 AI 辨識
        </button>
      </div>
    </div>

    <div id="step2Container" class="hidden flex-col h-full w-full relative overflow-hidden">

      <div
        class="bg-[#7C8A7B] text-white p-4 flex items-center justify-center relative font-medium shrink-0 shadow-sm z-10">
        <img src="https://r-forms.oneplace.com.tw/gray.png" alt="Logo" class="absolute left-4 h-6 object-contain">
        <span>資料確認與補全</span>
      </div>

      <div id="prevEntryBtn"
        class="absolute left-0 top-[110px] bg-gray-500 text-white px-1.5 py-4 rounded-r-md cursor-pointer transition-colors hover:bg-gray-600 flex flex-col items-center gap-1 text-sm font-medium z-10 hidden shadow-md">
        <span>&lt;</span><span>上</span><span>一</span><span>筆</span>
      </div>
      <div id="nextEntryBtn"
        class="absolute right-0 top-[110px] bg-[#7f8c8d] text-white px-1.5 py-4 rounded-l-md cursor-pointer transition-colors hover:bg-gray-500 flex flex-col items-center gap-1 text-sm font-medium z-10 hidden shadow-md">
        <span>&gt;</span><span>下</span><span>一</span><span>筆</span>
      </div>

      <div id="step2ScrollArea" class="flex-1 overflow-y-auto p-6 space-y-5 min-h-0 bg-white">

        <div class="flex flex-col items-start gap-3 border-b border-gray-100 pb-4 shrink-0">
          <div id="step2-counter"
            class="bg-gray-500 text-white px-3 py-1 rounded-full text-sm font-medium leading-none shadow-sm">
            1/2
          </div>
          <img id="step2-main-thumb" src=""
            class="h-24 w-24 object-cover rounded-md border border-gray-300 cursor-pointer transition-transform hover:scale-105 shadow-sm"
            title="點擊放大">
          <p class="text-xs font-medium text-gray-500">上傳的圖片 (點擊可放大)</p>
        </div>

        <div class="space-y-4 pb-4">
          <div>
            <label class="block text-sm font-bold text-gray-800 mb-1">收件地址或案場簡稱</label>
            <input type="text" id="ai-address"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none focus:border-transparent text-base font-medium"
              style="--tw-ring-color: #7C8A7B;">
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-800 mb-1">案場編號</label>
            <div class="flex gap-3">
              <input type="text" id="ai-project-id"
                class="flex-1 min-w-0 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none focus:border-transparent text-base"
                style="--tw-ring-color: #7C8A7B;">
              <button id="update-id-btn"
                class="shrink-0 px-5 py-3 rounded-lg font-medium text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed whitespace-nowrap shadow-sm"
                style="background-color: #7C8A7B;" disabled>
                更新編號
              </button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-800 mb-1">下單平台</label>
            <input type="text" id="ai-platform"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none focus:border-transparent text-base"
              style="--tw-ring-color: #7C8A7B;">
          </div>

          <div class="flex gap-4">
            <div class="flex-1">
              <label class="block text-sm font-bold text-gray-800 mb-1">總金額</label>
              <input type="number" id="ai-total"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none focus:border-transparent text-base"
                style="--tw-ring-color: #7C8A7B;">
            </div>
            <div class="flex-1">
              <label class="block text-sm font-bold text-gray-800 mb-1">發票稅額</label>
              <input type="number" id="ai-tax"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none focus:border-transparent text-base"
                style="--tw-ring-color: #7C8A7B;">
            </div>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-800 mb-1">備註</label>
            <textarea id="ai-memo" rows="2"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none focus:border-transparent resize-none text-base"
              style="--tw-ring-color: #7C8A7B;"></textarea>
          </div>
        </div>
      </div>

      <div
        class="px-5 pt-4 safe-pb bg-white border-t border-gray-100 mt-auto shrink-0 flex gap-3 justify-center z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button id="backBtn"
          class="flex-1 bg-gray-200 text-gray-700 py-3.5 rounded-lg font-bold hover:bg-gray-300 transition-colors text-base">
          返回重選
        </button>
        <button id="finalSubmitBtn" class="flex-1 text-white py-3.5 rounded-lg font-bold transition-colors text-base"
          style="background-color: #7C8A7B;">
          確認送出
        </button>
      </div>

    </div>

  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const sliderWrapper = document.getElementById('sliderWrapper');
    const previewSlider = document.getElementById('previewSlider');
    const posIndicator = document.getElementById('posIndicator');
    const errorMsg = document.getElementById('errorMsg');
    const uploadLabel = document.getElementById('uploadLabel');
    const nextBtn = document.getElementById('nextBtn');

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    const step1Container = document.getElementById('step1Container');
    const step2Container = document.getElementById('step2Container');

    const step2Counter = document.getElementById('step2-counter');
    const step2MainThumb = document.getElementById('step2-main-thumb');
    const prevEntryBtn = document.getElementById('prevEntryBtn');
    const nextEntryBtn = document.getElementById('nextEntryBtn');
    const step2ScrollArea = document.getElementById('step2ScrollArea');
    const updateIdBtn = document.getElementById('update-id-btn');

    const backBtn = document.getElementById('backBtn');
    const finalSubmitBtn = document.getElementById('finalSubmitBtn');

    const fields = {
      address: document.getElementById('ai-address'),
      projectId: document.getElementById('ai-project-id'),
      platform: document.getElementById('ai-platform'),
      total: document.getElementById('ai-total'),
      tax: document.getElementById('ai-tax'),
      memo: document.getElementById('ai-memo')
    };

    const MAX_COUNT = 10;
    const MAX_SIZE_MB = 5;
    let selectedFiles = [];
    let currentIndex = 0;
    let aiResults = [];
    let currentEditIndex = 0;
    let savedAddressForCurrentEntry = "";

    // ── Dropzone & Step 1 Logic ──────────────────────────────
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); });
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });

    document.getElementById('navPrev').addEventListener('click', () => goTo(currentIndex - 1));
    document.getElementById('navNext').addEventListener('click', () => goTo(currentIndex + 1));

    // Step 1 預覽區手機左右滑動
    let step1TouchStartX = 0;
    let step1TouchStartY = 0;

    sliderWrapper.addEventListener('touchstart', e => {
      step1TouchStartX = e.changedTouches[0].clientX;
      step1TouchStartY = e.changedTouches[0].clientY;
    }, { passive: true });

    sliderWrapper.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - step1TouchStartX;
      const dy = e.changedTouches[0].clientY - step1TouchStartY;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0 && currentIndex < selectedFiles.length - 1) {
          goTo(currentIndex + 1);
        } else if (dx > 0 && currentIndex > 0) {
          goTo(currentIndex - 1);
        }
      }
    }, { passive: true });

    function handleFiles(files) {
      const incoming = Array.from(files).filter(f => f.type.startsWith('image/'));
      if (!incoming.length) return;

      const valid = [];
      for (const f of incoming) {
        if (selectedFiles.length + valid.length >= MAX_COUNT) break;
        if (f.size <= MAX_SIZE_MB * 1024 * 1024) valid.push(f);
      }

      valid.forEach(file => {
        const idx = selectedFiles.length;
        selectedFiles.push({ file, dataURL: null });
        addSlide(idx, null);
        const reader = new FileReader();
        reader.onload = e => {
          selectedFiles[idx].dataURL = e.target.result;
          updateSlideImage(idx, e.target.result);
          updateUI();
        };
        reader.readAsDataURL(file);
      });
      currentIndex = selectedFiles.length - valid.length;
      updateUI();
    }

    function addSlide(idx, dataURL) {
      const slide = document.createElement('div');
      slide.className = 'slide-item';
      slide.dataset.idx = idx;
      slide.innerHTML = dataURL ? slideHTML(idx, dataURL) : `<div class="skeleton rounded-md" style="width:80%;height:80%;"></div>`;
      if (dataURL) bindSlideEvents(slide);
      previewSlider.appendChild(slide);
    }

    function slideHTML(idx, dataURL) {
      return `<img src="${dataURL}" class="img-fade cursor-pointer" draggable="false" style="max-width:100%;max-height:100%;object-fit:contain;display:block;"><button class="slide-delete-btn" data-idx="${idx}">&#x2715;</button>`;
    }

    function bindSlideEvents(slide) {
      slide.querySelector('img').onclick = () => openLightbox(slide.querySelector('img').src);
      slide.querySelector('.slide-delete-btn').onclick = e => { e.stopPropagation(); removeImage(parseInt(e.currentTarget.dataset.idx)); };
    }

    function updateSlideImage(idx, dataURL) {
      const slide = previewSlider.querySelector(`.slide-item[data-idx="${idx}"]`);
      if (slide) { slide.innerHTML = slideHTML(idx, dataURL); bindSlideEvents(slide); }
    }

    function removeImage(idx) {
      selectedFiles.splice(idx, 1);
      currentIndex = Math.max(0, Math.min(selectedFiles.length - 1, currentIndex));
      rebuildSlider();
    }

    function rebuildSlider() {
      previewSlider.innerHTML = '';
      if (!selectedFiles.length) {
        updateUI();
        return;
      }
      selectedFiles.forEach((item, i) => addSlide(i, item.dataURL));
      updateUI();
    }

    function goTo(idx) {
      if (!selectedFiles.length) return;
      currentIndex = Math.max(0, Math.min(selectedFiles.length - 1, idx));
      updateUI();
    }

    function updateUI() {
      if (selectedFiles.length > 0) {
        previewArea.classList.remove('hidden');
        uploadLabel.textContent = "繼續上傳圖片";
        uploadLabel.classList.remove('text-center');
      } else {
        previewArea.classList.add('hidden');
        uploadLabel.textContent = "Upload images";
        uploadLabel.classList.add('text-center');
      }

      previewSlider.style.transform = `translateX(-${currentIndex * 100}%)`;
      posIndicator.textContent = selectedFiles.length ? `${currentIndex + 1} / ${selectedFiles.length}` : '0 / 0';
      document.getElementById('navPrev').style.display = selectedFiles.length > 1 && currentIndex > 0 ? '' : 'none';
      document.getElementById('navNext').style.display = selectedFiles.length > 1 && currentIndex < selectedFiles.length - 1 ? '' : 'none';
    }

    function openLightbox(src) { lightboxImg.src = src; lightbox.classList.add('active'); }
    lightboxClose.onclick = () => { lightbox.classList.remove('active'); };

    // ── AI 辨識與多筆資料處理 ──────────────────────────────
    async function fetchN8nAI(base64Images) {
      const response = await fetch(
        'https://kh.oneplace.com.tw/webhook/5282a653-7c4c-4f4f-af7e-b9afe50cde0c',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            images: base64Images.map((dataURL, index) => ({ index, dataURL }))
          })
        }
      );
      if (!response.ok) throw new Error(`Webhook 回應錯誤：${response.status}`);
      const raw = await response.json();

      const rawArray = Array.isArray(raw) ? raw : [raw];
      return rawArray.map(item => {
        const amount = Number(item.order_amount) || 0;
        const tax = Math.round(amount * 5 / 105);
        return {
          address: item.recipient_address || '',
          projectId: item.projectId || '',  // 🌟 對應 n8n 的 projectId
          platform: item.platform || '',
          total: amount || '',
          tax: tax || '',
          memo: item.order_date ? `訂單日期：${item.order_date}` : ''
        };
      });
    }

    async function simulateRagicQuery(addressStr) {
      return new Promise((resolve) => {
        setTimeout(() => {
          if (addressStr.includes('台中')) resolve('268');
          else if (addressStr.includes('內湖') || addressStr.includes('台北')) resolve('312');
          else resolve('999');
        }, 800);
      });
    }

    function saveCurrentEntry() {
      if (!aiResults[currentEditIndex]) return;
      aiResults[currentEditIndex].address = fields.address.value;
      aiResults[currentEditIndex].projectId = fields.projectId.value;
      aiResults[currentEditIndex].platform = fields.platform.value;
      aiResults[currentEditIndex].total = fields.total.value;
      aiResults[currentEditIndex].tax = fields.tax.value;
      aiResults[currentEditIndex].memo = fields.memo.value;
    }

    // 加入 skipSave 參數，預設為 false
    function loadEntry(index, skipSave = false) {
      // 1. 先確認索引有效性
      if (index < 0 || index >= selectedFiles.length) return;

      // 2. 只有在非初始載入時，才儲存上一筆編輯中的資料
      if (!skipSave) {
        saveCurrentEntry();
      }

      // 3. 更新全域編輯索引
      currentEditIndex = index;
      const data = aiResults[index] || {};
      const imgUrl = selectedFiles[index].dataURL;

      step2Counter.textContent = `${index + 1} / ${selectedFiles.length}`;
      step2MainThumb.src = imgUrl;
      step2MainThumb.onclick = () => openLightbox(imgUrl);

      savedAddressForCurrentEntry = data.address || '';
      fields.address.value = savedAddressForCurrentEntry;
      fields.projectId.value = data.projectId || '';
      fields.platform.value = data.platform || '';
      fields.total.value = data.total || '';
      fields.tax.value = data.tax || '';
      fields.memo.value = data.memo || '';

      updateIdBtn.disabled = true;

      if (index === 0) {
        prevEntryBtn.classList.add('hidden');
      } else {
        prevEntryBtn.classList.remove('hidden');
      }

      if (index === selectedFiles.length - 1) {
        nextEntryBtn.classList.add('hidden');
      } else {
        nextEntryBtn.classList.remove('hidden');
      }

      // 讓 ScrollArea 回到最上方，方便檢視
      step2ScrollArea.scrollTop = 0;
    }
    fields.address.addEventListener('input', (e) => {
      if (e.target.value.trim() !== savedAddressForCurrentEntry.trim()) {
        updateIdBtn.disabled = false;
      } else {
        updateIdBtn.disabled = true;
      }
    });

    updateIdBtn.addEventListener('click', async () => {
      const newAddress = fields.address.value;
      updateIdBtn.disabled = true;
      updateIdBtn.innerHTML = '<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';

      try {
        // 發送地址到 webhook，等待 n8n Respond to Webhook 回傳 projectId
        const response = await fetch('https://kh.oneplace.com.tw/webhook/6b8220a4-a225-4fc7-9c1e-5010b9b91427', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: newAddress })
        });
        const data = await response.json();
        const newProjectId = data.projectId ?? '';
        if (!newProjectId) console.warn('Webhook 未回傳 projectId，請確認 n8n 流程');
        fields.projectId.value = newProjectId;
        aiResults[currentEditIndex].projectId = newProjectId;
        savedAddressForCurrentEntry = newAddress;
        saveCurrentEntry();
      } finally {
        updateIdBtn.innerHTML = '更新編號';
        // 額外確保按鈕狀態正確（地址若相同則禁用，不同則啟用）
        updateIdBtn.disabled = (fields.address.value.trim() === savedAddressForCurrentEntry.trim());
      }
    });

    prevEntryBtn.onclick = () => { if (currentEditIndex > 0) loadEntry(currentEditIndex - 1); };
    nextEntryBtn.onclick = () => { if (currentEditIndex < selectedFiles.length - 1) loadEntry(currentEditIndex + 1); };

    // Step 2 手勢滑動切換
    let step2TouchStartX = 0;
    let step2TouchStartY = 0;

    step2ScrollArea.addEventListener('touchstart', e => {
      step2TouchStartX = e.changedTouches[0].clientX;
      step2TouchStartY = e.changedTouches[0].clientY;
    }, { passive: true });

    step2ScrollArea.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - step2TouchStartX;
      const dy = e.changedTouches[0].clientY - step2TouchStartY;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0 && currentEditIndex < selectedFiles.length - 1) {
          loadEntry(currentEditIndex + 1);
        } else if (dx > 0 && currentEditIndex > 0) {
          loadEntry(currentEditIndex - 1);
        }
      }
    }, { passive: true });

    // --- 觸發辨識 ---
    nextBtn.addEventListener('click', async () => {
      if (!selectedFiles.length) {
        errorMsg.textContent = "請先上傳至少一張圖片！";
        errorMsg.classList.remove('hidden');
        setTimeout(() => errorMsg.classList.add('hidden'), 3000);
        return;
      }

      nextBtn.disabled = true;
      nextBtn.innerHTML = `AI 辨識中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;

      try {
        const base64Images = selectedFiles.map(f => f.dataURL);
        aiResults = await fetchN8nAI(base64Images);

        loadEntry(0, true);
        step1Container.classList.add('hidden');
        step2Container.classList.remove('hidden');
        step2Container.classList.add('flex');
      } finally {
        nextBtn.innerHTML = '進行 AI 辨識';
        nextBtn.disabled = false;
      }
    });

    backBtn.onclick = () => {
      step2Container.classList.add('hidden');
      step2Container.classList.remove('flex');
      step1Container.classList.remove('hidden');
    };

    finalSubmitBtn.onclick = () => {
      saveCurrentEntry();
      console.log("準備送出的多筆資料:", aiResults);
      alert(`資料已成功送出！共處理了 ${aiResults.length} 筆單據。`);
      location.reload();
    };

    updateUI();
  </script>
</body>

</html>
