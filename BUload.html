<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>信用卡快速申報系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --accent: #7C8A7B;
      --dark: #333333;
      --bg: #E8EAEB;
    }

    * {
      box-sizing: border-box;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      height: 100dvh;
      width: 100%;
      overflow: hidden;
    }

    .drag-over {
      background-color: #f0f4f0 !important;
      border-color: var(--accent) !important;
    }

    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #3a3a3a 25%, #4a4a4a 50%, #3a3a3a 75%);
      background-size: 400px 100%;
      animation: shimmer 1.2s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .img-fade {
      animation: fadeIn 0.2s ease forwards;
    }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    #lightbox.active { display: flex; }

    #lightboxImg {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #lightboxClose {
      position: absolute;
      top: 20px;
      right: 24px;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    .dot {
      display: inline-block;
      animation: blink 1.4s infinite both;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    #previewArea {
      background-color: #333333;
      width: 100%;
      overflow: hidden;
    }

    #previewSlider {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .slide-item {
      flex-shrink: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slide-item img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .slide-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    #posIndicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 999px;
      z-index: 20;
    }

    .safe-pb {
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }
  </style>
</head>

<body class="font-sans flex justify-center h-[100dvh]">

  <div id="lightbox">
    <span id="lightboxClose">&times;</span>
    <img id="lightboxImg" src="" alt="preview">
  </div>

  <div class="bg-white w-full lg:max-w-md flex flex-col relative h-[100dvh] lg:h-screen lg:shadow-2xl lg:border-x lg:border-gray-300 overflow-hidden mx-auto">

    <div id="step1Container" class="flex flex-col h-full w-full overflow-hidden">
      <div class="bg-[#7C8A7B] text-white p-4 flex items-center justify-center relative font-medium shrink-0 shadow-sm z-10">
        <img src="https://r-forms.oneplace.com.tw/gray.png" alt="Logo" class="absolute left-4 h-6 object-contain">
        <span>信用卡快速申報</span>
      </div>

      <div id="previewArea" class="w-full hidden relative bg-[#333333] shrink min-h-[25vh] basis-[60vh]">
        <div id="sliderWrapper" class="w-full h-full relative">
          <div id="previewSlider"></div>
          <button id="navPrev" class="nav-arrow" style="left:8px">&#8249;</button>
          <button id="navNext" class="nav-arrow" style="right:8px">&#8250;</button>
          <div id="posIndicator">1 / 1</div>
        </div>
      </div>

      <div class="grow shrink-0 flex flex-col justify-center items-center px-6 py-4 bg-white z-10">
        <div class="w-full">
          <label id="uploadLabel" class="block text-sm font-bold text-gray-700 mb-2 text-center">Upload images</label>
          <div id="dropzone" class="w-full h-[120px] shrink-0 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center cursor-pointer transition-colors duration-200 hover:bg-gray-50">
            <svg class="w-8 h-8 text-gray-400 mb-1" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" /></svg>
            <p class="text-sm text-gray-500 text-center leading-tight">Drag & drop files or <span class="underline font-medium text-gray-700">browse</span></p>
            <p class="text-[11px] text-gray-400 mt-1">最多 10 張・每張 5 MB 以內</p>
            <input type="file" id="fileInput" class="hidden" multiple accept="image/*" />
          </div>
          <p id="errorMsg" class="text-xs text-red-500 mt-1.5 hidden text-center"></p>
        </div>
      </div>

      <div class="px-5 pt-4 safe-pb bg-white border-t border-gray-100 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
        <button id="nextBtn" class="w-full text-white py-3.5 rounded-lg font-bold transition-all duration-200 disabled:opacity-50 text-base" style="background-color:#7C8A7B;">進行 AI 辨識</button>
      </div>
    </div>

    <div id="step2Container" class="hidden flex-col h-full w-full relative overflow-hidden">
      <div class="bg-[#7C8A7B] text-white p-4 flex items-center justify-center relative font-medium shrink-0 shadow-sm z-10">
        <img src="https://r-forms.oneplace.com.tw/gray.png" alt="Logo" class="absolute left-4 h-6 object-contain">
        <span>資料確認與補全</span>
      </div>

      <div id="prevEntryBtn" class="absolute left-0 top-[110px] bg-gray-500 text-white px-1.5 py-4 rounded-r-md cursor-pointer z-10 hidden shadow-md">
        <span>&lt;</span><span>上</span><span>一</span><span>筆</span>
      </div>
      <div id="nextEntryBtn" class="absolute right-0 top-[110px] bg-[#7f8c8d] text-white px-1.5 py-4 rounded-l-md cursor-pointer z-10 hidden shadow-md">
        <span>&gt;</span><span>下</span><span>一</span><span>筆</span>
      </div>

      <div id="step2ScrollArea" class="flex-1 overflow-y-auto p-6 space-y-5 bg-white">
        <div class="flex flex-col items-start gap-3 border-b border-gray-100 pb-4">
          <div id="step2-counter" class="bg-gray-500 text-white px-3 py-1 rounded-full text-sm font-medium leading-none shadow-sm">1/2</div>
          <img id="step2-main-thumb" src="" class="h-24 w-24 object-cover rounded-md border border-gray-300 cursor-pointer shadow-sm" title="點擊放大">
          <p class="text-xs font-medium text-gray-500">上傳的圖片 (點擊可放大)</p>
        </div>

        <div class="space-y-4 pb-4">
          <div>
            <label class="block text-sm font-bold text-gray-800 mb-1">收件地址或案場簡稱</label>
            <input type="text" id="ai-address" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none text-base" style="--tw-ring-color: #7C8A7B;">
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-800 mb-1">案場編號</label>
            <div class="flex gap-3">
              <input type="text" id="ai-project-id" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none text-base" style="--tw-ring-color: #7C8A7B;">
              <button id="update-id-btn" class="px-5 py-3 rounded-lg font-medium text-white disabled:opacity-50" style="background-color: #7C8A7B;" disabled>更新編號</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-800 mb-1">下單平台</label>
            <input type="text" id="ai-platform" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none text-base" style="--tw-ring-color: #7C8A7B;">
          </div>
          <div class="flex gap-4">
            <div class="flex-1">
              <label class="block text-sm font-bold text-gray-800 mb-1">總金額</label>
              <input type="number" id="ai-total" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none text-base" style="--tw-ring-color: #7C8A7B;">
            </div>
            <div class="flex-1">
              <label class="block text-sm font-bold text-gray-800 mb-1">發票稅額</label>
              <input type="number" id="ai-tax" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none text-base" style="--tw-ring-color: #7C8A7B;">
            </div>
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-800 mb-1">備註</label>
            <textarea id="ai-memo" rows="2" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none resize-none text-base" style="--tw-ring-color: #7C8A7B;"></textarea>
          </div>
        </div>
      </div>

      <div class="px-5 pt-4 safe-pb bg-white border-t border-gray-100 flex gap-3 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button id="backBtn" class="flex-1 bg-gray-200 text-gray-700 py-3.5 rounded-lg font-bold text-base">返回重選</button>
        <button id="finalSubmitBtn" class="flex-1 text-white py-3.5 rounded-lg font-bold text-base" style="background-color: #7C8A7B;">確認送出</button>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const previewSlider = document.getElementById('previewSlider');
    const previewArea = document.getElementById('previewArea');
    const nextBtn = document.getElementById('nextBtn');
    const step1Container = document.getElementById('step1Container');
    const step2Container = document.getElementById('step2Container');
    const step2Counter = document.getElementById('step2-counter');
    const step2MainThumb = document.getElementById('step2-main-thumb');
    const prevEntryBtn = document.getElementById('prevEntryBtn');
    const nextEntryBtn = document.getElementById('nextEntryBtn');
    const updateIdBtn = document.getElementById('update-id-btn');
    const step2ScrollArea = document.getElementById('step2ScrollArea');

    const fields = {
      address: document.getElementById('ai-address'),
      projectId: document.getElementById('ai-project-id'),
      platform: document.getElementById('ai-platform'),
      total: document.getElementById('ai-total'),
      tax: document.getElementById('ai-tax'),
      memo: document.getElementById('ai-memo')
    };

    let selectedFiles = [];
    let currentIndex = 0;
    let aiResults = [];
    let currentEditIndex = 0;
    let savedAddressForCurrentEntry = "";

    // ── File Handling ──────────────────────────────
    document.getElementById('dropzone').onclick = () => fileInput.click();
    fileInput.onchange = e => { handleFiles(e.target.files); fileInput.value = ''; };

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
          selectedFiles.push({ file, dataURL: e.target.result });
          rebuildSlider();
        };
        reader.readAsDataURL(file);
      });
    }

    function rebuildSlider() {
      previewSlider.innerHTML = '';
      selectedFiles.forEach((f, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide-item';
        slide.innerHTML = `<img src="${f.dataURL}"><button onclick="removeImage(${i})" class="slide-delete-btn">&times;</button>`;
        previewSlider.appendChild(slide);
      });
      updateUI();
    }

    function removeImage(idx) {
      selectedFiles.splice(idx, 1);
      currentIndex = Math.max(0, currentIndex - 1);
      rebuildSlider();
    }

    function updateUI() {
      previewArea.classList.toggle('hidden', selectedFiles.length === 0);
      previewSlider.style.transform = `translateX(-${currentIndex * 100}%)`;
      document.getElementById('posIndicator').textContent = `${currentIndex + 1} / ${selectedFiles.length}`;
    }

    function goTo(idx) {
      currentIndex = Math.max(0, Math.min(selectedFiles.length - 1, idx));
      updateUI();
    }
    document.getElementById('navPrev').onclick = () => goTo(currentIndex - 1);
    document.getElementById('navNext').onclick = () => goTo(currentIndex + 1);

    // ── AI & Data Logic ──────────────────────────────
    async function fetchN8nAI(base64Images) {
      const response = await fetch('https://kh.oneplace.com.tw/webhook/5282a653-7c4c-4f4f-af7e-b9afe50cde0c', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: base64Images.map((dataURL, index) => ({ index, dataURL })) })
      });
      const raw = await response.json();
      const rawArray = Array.isArray(raw) ? raw : [raw];

      // 🌟 強制校正：按上傳圖片的順序建立資料，防止索引偏移
      return selectedFiles.map((_, i) => {
        const item = rawArray[i] || {}; 
        const amount = Number(item.order_amount) || 0;
        return {
          address: item.recipient_address || '',
          projectId: item.projectId || '',
          platform: item.platform || '',
          total: amount || '',
          tax: Math.round(amount * 5 / 105) || '',
          memo: item.order_date ? `訂單日期：${item.order_date}` : ''
        };
      });
    }

    function saveCurrentEntry() {
      if (!aiResults[currentEditIndex]) return;
      Object.keys(fields).forEach(key => {
        aiResults[currentEditIndex][key] = fields[key].value;
      });
    }

    function loadEntry(index, skipSave = false) {
      if (index < 0 || index >= selectedFiles.length) return;
      if (!skipSave) saveCurrentEntry();
      
      currentEditIndex = index;
      const data = aiResults[index] || {};
      const imgUrl = selectedFiles[index].dataURL;

      // 更新 UI
      step2Counter.textContent = `${index + 1} / ${selectedFiles.length}`;
      step2MainThumb.src = imgUrl;

      // 強制寫入欄位
      fields.address.value = data.address || '';
      fields.projectId.value = data.projectId || '';
      fields.platform.value = data.platform || '';
      fields.total.value = data.total || '';
      fields.tax.value = data.tax || '';
      fields.memo.value = data.memo || '';

      savedAddressForCurrentEntry = fields.address.value;
      updateIdBtn.disabled = true;

      // 按鈕顯隱控制
      prevEntryBtn.classList.toggle('hidden', index === 0);
      nextEntryBtn.classList.toggle('hidden', index === selectedFiles.length - 1);
      
      step2ScrollArea.scrollTop = 0;
    }

    // ── Event Listeners ──────────────────────────────
    fields.address.oninput = e => {
      updateIdBtn.disabled = e.target.value.trim() === savedAddressForCurrentEntry.trim();
    };

    updateIdBtn.onclick = async () => {
      const newAddress = fields.address.value;
      updateIdBtn.disabled = true;
      updateIdBtn.innerHTML = '查詢中...';
      try {
        const resp = await fetch('https://kh.oneplace.com.tw/webhook/6b8220a4-a225-4fc7-9c1e-5010b9b91427', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: newAddress })
        });
        const data = await resp.json();
        fields.projectId.value = data.projectId || '';
        aiResults[currentEditIndex].projectId = data.projectId || '';
        savedAddressForCurrentEntry = newAddress;
      } finally {
        updateIdBtn.innerHTML = '更新編號';
      }
    };

    prevEntryBtn.onclick = () => loadEntry(currentEditIndex - 1);
    nextEntryBtn.onclick = () => loadEntry(currentEditIndex + 1);

    nextBtn.onclick = async () => {
      if (!selectedFiles.length) return;
      nextBtn.disabled = true;
      nextBtn.innerHTML = 'AI 辨識中...';
      try {
        aiResults = await fetchN8nAI(selectedFiles.map(f => f.dataURL));
        loadEntry(0, true);
        step1Container.classList.add('hidden');
        step2Container.classList.remove('hidden');
      } finally {
        nextBtn.innerHTML = '進行 AI 辨識';
        nextBtn.disabled = false;
      }
    };

    backBtn.onclick = () => {
      step2Container.classList.add('hidden');
      step1Container.classList.remove('hidden');
    };

    finalSubmitBtn.onclick = () => {
      saveCurrentEntry();
      alert(`成功送出 ${aiResults.length} 筆資料！`);
      location.reload();
    };

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    document.getElementById('lightboxClose').onclick = () => document.getElementById('lightbox').classList.remove('active');
  </script>
</body>
</html>
