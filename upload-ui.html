<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多圖片上傳系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --accent: #788A79;
      --dark: #333333;
      --bg: #E8EAEB;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
    }

    .drag-over {
      background-color: #f0f4f0 !important;
      border-color: var(--accent) !important;
    }

    @keyframes shimmer {
      0% {
        background-position: -400px 0;
      }

      100% {
        background-position: 400px 0;
      }
    }

    .skeleton {
      background: linear-gradient(90deg, #3a3a3a 25%, #4a4a4a 50%, #3a3a3a 75%);
      background-size: 400px 100%;
      animation: shimmer 1.2s infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .img-fade {
      animation: fadeIn 0.2s ease forwards;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    #lightbox.active {
      display: flex;
    }

    #lightboxImg {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #lightboxClose {
      position: absolute;
      top: 20px;
      right: 24px;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    #lightboxClose:hover {
      opacity: 1;
    }

    /* Submit loading dots */
    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0;
      }

      40% {
        opacity: 1;
      }
    }

    .dot {
      display: inline-block;
      animation: blink 1.4s infinite both;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* Preview slider */
    #previewArea {
      position: relative;
      background-color: #333333;
      width: 100%;
      overflow: hidden;
    }

    #previewSlider {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .slide-item {
      flex-shrink: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .slide-item img {
      max-width: 100%;
      max-height: 100%;
      Ｓ object-fit: contain;
      display: block;
    }

    /* X delete button on slide */
    .slide-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 10;
    }

    .slide-delete-btn:hover {
      background: rgba(200, 30, 30, 0.85);
    }

    /* Nav arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: background 0.15s;
    }

    .nav-arrow:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    #navPrev {
      left: 8px;
    }

    #navNext {
      right: 8px;
    }

    /* Position indicator */
    #posIndicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
      backdrop-filter: blur(3px);
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }
  </style>
</head>

<body class="min-h-screen font-sans">

  <!-- Lightbox -->
  <div id="lightbox">
    <span id="lightboxClose">&times;</span>
    <img id="lightboxImg" src="" alt="preview">
  </div>

  <div class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">

      <!-- Preview Area -->
      <div id="previewArea" class="w-full" style="aspect-ratio: 4/3; min-height: 180px;">

        <!-- Empty State -->
        <div id="emptyState"
          class="w-full h-full flex flex-col items-center justify-center gap-2 text-gray-400 select-none pointer-events-none"
          style="min-height:180px;">
          <svg width="38" height="38" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.3">
            <rect x="3" y="3" width="18" height="18" rx="3" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 15l-5-5L5 21" />
          </svg>
          <span class="text-sm">圖片預覽區</span>
        </div>

        <!-- Slider wrapper (hidden when empty) -->
        <div id="sliderWrapper" class="hidden w-full h-full relative" style="min-height:180px;">
          <div id="previewSlider"></div>

          <!-- Prev / Next -->
          <button id="navPrev" class="nav-arrow">&#8249;</button>
          <button id="navNext" class="nav-arrow">&#8250;</button>

          <!-- Position indicator  e.g. 2 / 3 -->
          <div id="posIndicator">1 / 1</div>
        </div>
      </div>

      <div class="p-6 space-y-5">

        <!-- Dropzone -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Upload images</label>
          <div id="dropzone"
            class="border-2 border-dashed border-gray-300 rounded-xl p-6 flex flex-col items-center justify-center cursor-pointer transition-colors duration-200 hover:bg-gray-50">
            <svg class="w-8 h-8 text-gray-400 mb-2" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" />
            </svg>
            <p class="text-sm text-gray-500 text-center leading-5">
              Drag &amp; drop files or <span class="underline">browse</span>
            </p>
            <p class="text-xs text-gray-400 mt-1">最多 10 張・每張 5 MB 以內</p>
            <input type="file" id="fileInput" class="hidden" multiple accept="image/*" />
          </div>
          <p id="errorMsg" class="text-xs text-red-500 mt-1.5 hidden"></p>
        </div>

        <!-- Submit Button -->
        <button id="submitBtn"
          class="w-full text-white py-3 rounded-lg font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed"
          style="background-color:#7C8A7B; --tw-ring-color:#7C8A7B;"
          onmouseover="if(!this.disabled) this.style.filter='brightness(0.88)'"
          onmouseout="this.style.filter=''">Submit</button>

      </div>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const emptyState = document.getElementById('emptyState');
    const sliderWrapper = document.getElementById('sliderWrapper');
    const previewSlider = document.getElementById('previewSlider');
    const navPrev = document.getElementById('navPrev');
    const navNext = document.getElementById('navNext');
    const posIndicator = document.getElementById('posIndicator');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    const MAX_COUNT = 10;
    const MAX_SIZE_MB = 5;

    let selectedFiles = []; // [{ file, dataURL }]
    let currentIndex = 0;

    // ── Dropzone interactions ──────────────────────────────
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); });
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
    });

    // ── Nav arrows ─────────────────────────────────────────
    navPrev.addEventListener('click', () => goTo(currentIndex - 1));
    navNext.addEventListener('click', () => goTo(currentIndex + 1));

    // Touch / swipe support
    let touchStartX = 0;
    sliderWrapper.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    sliderWrapper.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) goTo(currentIndex + (dx < 0 ? 1 : -1));
    }, { passive: true });

    // ── Handle incoming files ──────────────────────────────
    function handleFiles(files) {
      const incoming = Array.from(files).filter(f => f.type.startsWith('image/'));
      if (!incoming.length) return;

      const firstError = [];
      const valid = [];

      for (const f of incoming) {
        if (selectedFiles.length + valid.length >= MAX_COUNT) {
          firstError[0] = firstError[0] || `已達上限 ${MAX_COUNT} 張，部分圖片未加入`;
          break;
        }
        if (f.size > MAX_SIZE_MB * 1024 * 1024) {
          firstError[0] = firstError[0] || `「${f.name}」超過 ${MAX_SIZE_MB} MB，已略過`;
          continue;
        }
        const dup = selectedFiles.some(s => s.file.name === f.name && s.file.size === f.size);
        if (!dup) valid.push(f);
      }

      showError(firstError[0] || '');

      valid.forEach(file => {
        const idx = selectedFiles.length;
        selectedFiles.push({ file, dataURL: null });
        addSlide(idx, null);

        const reader = new FileReader();
        reader.onload = e => {
          selectedFiles[idx].dataURL = e.target.result;
          updateSlideImage(idx, e.target.result);
          updateUI();
        };
        reader.readAsDataURL(file);
      });

      // Jump to last new slide
      currentIndex = selectedFiles.length - valid.length;
      updateUI();
    }

    // ── Add a slide (skeleton or real) ───────────────────
    function addSlide(idx, dataURL) {
      emptyState.style.display = 'none';
      sliderWrapper.classList.remove('hidden');

      const slide = document.createElement('div');
      slide.className = 'slide-item';
      slide.dataset.idx = idx;

      if (dataURL) {
        slide.innerHTML = slideHTML(idx, dataURL);
        bindSlideEvents(slide);
      } else {
        slide.innerHTML = `<div class="skeleton rounded-md" style="width:80%;height:80%;"></div>`;
      }

      previewSlider.appendChild(slide);
    }

    function slideHTML(idx, dataURL) {
      return `
        <img
          src="${dataURL}"
          class="img-fade cursor-pointer"
          draggable="false"
          title="點擊放大"
          style="max-width:100%;max-height:100%;object-fit:contain;display:block;"
        >
        <button class="slide-delete-btn" data-idx="${idx}" title="移除">&#x2715;</button>
      `;
    }

    function bindSlideEvents(slide) {
      const img = slide.querySelector('img');
      const btn = slide.querySelector('.slide-delete-btn');
      if (img) img.addEventListener('click', () => openLightbox(img.src));
      if (btn) btn.addEventListener('click', e => {
        e.stopPropagation();
        removeImage(parseInt(e.currentTarget.dataset.idx));
      });
    }

    // ── Update existing slide image (skeleton → real) ─────
    function updateSlideImage(idx, dataURL) {
      const slide = previewSlider.querySelector(`.slide-item[data-idx="${idx}"]`);
      if (!slide) return;
      slide.innerHTML = slideHTML(idx, dataURL);
      bindSlideEvents(slide);
    }

    // ── Remove image ──────────────────────────────────────
    function removeImage(idx) {
      selectedFiles.splice(idx, 1);
      if (currentIndex >= selectedFiles.length) currentIndex = Math.max(0, selectedFiles.length - 1);
      rebuildSlider();
    }

    // ── Full rebuild ──────────────────────────────────────
    function rebuildSlider() {
      previewSlider.innerHTML = '';

      if (!selectedFiles.length) {
        sliderWrapper.classList.add('hidden');
        emptyState.style.display = 'flex';
        updateUI();
        return;
      }

      selectedFiles.forEach((item, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide-item';
        slide.dataset.idx = i;
        if (item.dataURL) {
          slide.innerHTML = slideHTML(i, item.dataURL);
          bindSlideEvents(slide);
        } else {
          slide.innerHTML = `<div class="skeleton rounded-md" style="width:80%;height:80%;"></div>`;
        }
        previewSlider.appendChild(slide);
      });

      sliderWrapper.classList.remove('hidden');
      emptyState.style.display = 'none';
      updateUI();
    }

    // ── Go to index ───────────────────────────────────────
    function goTo(idx) {
      if (!selectedFiles.length) return;
      currentIndex = Math.max(0, Math.min(selectedFiles.length - 1, idx));
      updateUI();
    }

    // ── Update slider transform + indicator + arrows ──────
    function updateUI() {
      const total = selectedFiles.length;
      previewSlider.style.transform = `translateX(-${currentIndex * 100}%)`;

      if (total > 0) {
        posIndicator.textContent = `${currentIndex + 1} / ${total}`;
        posIndicator.style.display = '';
        navPrev.style.display = total > 1 && currentIndex > 0 ? '' : 'none';
        navNext.style.display = total > 1 && currentIndex < total - 1 ? '' : 'none';
      } else {
        posIndicator.style.display = 'none';
        navPrev.style.display = 'none';
        navNext.style.display = 'none';
      }
    }

    // ── Error ──────────────────────────────────────────────
    function showError(msg) {
      if (msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.remove('hidden');
        setTimeout(() => errorMsg.classList.add('hidden'), 4000);
      } else {
        errorMsg.classList.add('hidden');
      }
    }

    // ── Lightbox ───────────────────────────────────────────
    function openLightbox(src) { lightboxImg.src = src; lightbox.classList.add('active'); }
    function closeLightbox() { lightbox.classList.remove('active'); lightboxImg.src = ''; }

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ── Submit ─────────────────────────────────────────────
    submitBtn.addEventListener('click', () => {
      if (!selectedFiles.length) { showError('請先上傳至少一張圖片！'); return; }

      submitBtn.disabled = true;
      submitBtn.innerHTML = `Uploading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;

      setTimeout(() => {
        alert(`成功送出 ${selectedFiles.length} 張圖片！`);
        submitBtn.innerHTML = 'Submit';
        submitBtn.disabled = false;
        selectedFiles = [];
        currentIndex = 0;
        rebuildSlider();
        showError('');
      }, 1500);
    });

    // Init
    updateUI();
  </script>
</body>

</html>
